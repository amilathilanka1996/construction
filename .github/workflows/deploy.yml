name: Build and Deploy Frontend + Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Build Vue frontend
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # -------------------------
      # Prepare backend package
      # -------------------------
      - name: Remove unnecessary backend files
        run: |
          rm -rf backend/.git
          rm -rf backend/node_modules || true
          rm -rf backend/tests || true
          rm -rf backend/runtime/cache/* || true

      # -------------------------
      # Deploy frontend dist
      # -------------------------
      - name: Deploy frontend to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          dangerous-clean-slate: false

      # -------------------------
      # Deploy backend
      # -------------------------
      - name: Deploy backend to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /app_backend/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/runtime/cache/**
            **/vendor/bin/**
            **/.env
            **/README.md
          dangerous-clean-slate: false